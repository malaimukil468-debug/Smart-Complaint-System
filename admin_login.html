<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Complaint</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        body {
            background-image: url("/static/images/technision_selection.png");
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="glass-container auth-card"
            style="border: 1px solid rgba(0, 210, 255, 0.2); box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);">
            <h1 class="auth-title">ADMIN LOGIN</h1>
            <p class="auth-subtitle">Secure Server Access</p>

            <form action="/admin_login" method="post">
                <div class="form-group">
                    <input type="email" name="username" class="form-control" placeholder="Admin Email" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3">LOGIN</button>
            </form>

            <div class="mt-4" style="font-size: 12px; color: var(--text-muted);">
                Authorized personnel only
            </div>

            <div class="mt-4 pt-3 text-center" style="border-top: 1px solid var(--glass-border); font-size: 12px;">
                <a href="/" style="color: var(--text-secondary);">Return Home</a>
            </div>
        </div>
    </div>

</body>

</html>
