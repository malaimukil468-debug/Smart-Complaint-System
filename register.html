<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Complaint</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        /* Specific background override for registration page if desired, otherwise falls back to global bg */
        body {
            background-image: url("/static/images/registation.png");
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="glass-container auth-card">
            <h1 class="auth-title">SMART COMPLAINT</h1>
            <p class="auth-subtitle">Create your account</p>

            <form action="/register" method="post">
                <div class="form-group">
                    <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3">Create Account</button>
            </form>

            <div class="mt-4 flex justify-between items-center" style="font-size: 13px; color: var(--text-secondary);">
                Already have an account? <a href="/">Sign in</a>
            </div>
        </div>
    </div>

</body>

</html>
